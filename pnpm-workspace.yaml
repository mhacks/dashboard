overrides:
  # Dedupe to a single zod 4.x. Otherwise shadcn's MCP SDK pulls zod@3.25.76
  # (whose embedded v4-core reports minor 0), and @hookform/resolvers resolves
  # its zod/v4/core types against that copy — clashing with the app's zod@4.4.3
  # schemas (minor 4) and breaking zodResolver typechecking / the build.
  zod: 4.4.3
allowBuilds:
  esbuild: true
  msw: true
  sharp: true
  unrs-resolver: true
ignoredBuiltDependencies:
  - sharp
  - unrs-resolver
minimumReleaseAgeExclude:
  - esbuild@0.24.3
  - next@16.1.7
  - next@16.2.3
  - postcss@8.5.10
  - next@16.2.5
  - next@16.2.6
onlyBuiltDependencies:
  - msw
  - esbuild
