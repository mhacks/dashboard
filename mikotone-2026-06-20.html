}

const manager = new SourceManager();

controls.onChange('source', (url) => manager.load(url));
controls.onChange('useWebcam', (val) => val ? manager.setupWebcam() : manager.load(controls.get('source')));
controls.onChange('resolution', () => manager.updateBufferSize());
controls.onChange('matchSourceRes', () => manager.updateBufferSize());
controls.onChange('play', (val) => {
  if ((sourceType === 'video' || sourceType === 'webcam') && sourceElement) {
    val ? sourceElement.play() : sourceElement.pause();
  }
});

window.addEventListener('resize', () => {
  if (!controls.get('matchSourceRes')) {
    manager.updateBufferSize();
  }
});

manager.load(controls.get('source'));

function draw() {
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  if (!isLoaded || !sourceElement) {
    requestAnimationFrame(draw);
    return;
  }

  // Sample to buffer
  bctx.save();
  if (sourceType === 'webcam') {
    bctx.translate(buffer.width, 0);
    bctx.scale(-1, 1);
  }
  bctx.drawImage(sourceElement, 0, 0, buffer.width, buffer.height);
  bctx.restore();

  const imageData = bctx.getImageData(0, 0, buffer.width, buffer.height);
  const data = imageData.data;

  const resX = buffer.width;
  const resY = buffer.height;
  const cellW = w / resX;
  const cellH = h / resY;
  
  const minScale = controls.get('minScale');
  const maxScale = controls.get('maxScale');
  const shape = controls.get('shape');
  const colorMode = controls.get('colorMode');
  const fgColor = controls.get('fgColor');
  const invert = controls.get('invert');
  const contrast = controls.get('contrast');
  const smoothing = controls.get('smoothing');
  const threshold = controls.get('threshold');
  const smoothThreshold = controls.get('smoothThreshold');

  const echoEnabled = controls.get('echoEnabled');
  const echoCount = controls.get('echoCount');
  const echoTimeOffset = controls.get('echoTimeOffset');
  const echoDecay = controls.get('echoDecay');
  const echoScale = controls.get('echoScale');
  const echoOffsetX = controls.get('echoOffsetX');
  const echoOffsetY = controls.get('echoOffsetY');
  const echoColor = controls.get('echoColor');

  // Prepare current frame data for history
  const currentFrame = new Float32Array(resX * resY * 5); // r, g, b, bVal, visibility

  for (let y = 0; y < resY; y++) {
    for (let x = 0; x < resX; x++) {
      const idx = (y * resX + x) * 4;
      const r = data[idx];
      const g = data[idx + 1];
      const b = data[idx + 2];
      
      let brightness = (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
      brightness = (brightness - 0.5) * contrast + 0.5;
      brightness = Math.max(0, Math.min(1, brightness));

      if (invert) brightness = 1 - brightness;

      const cacheIdx = y * resX + x;
      brightnessCache[cacheIdx] = brightnessCache[cacheIdx] * smoothing + brightness * (1 - smoothing);
      const bVal = brightnessCache[cacheIdx];

      // Smooth Threshold Logic
      let visibility = 1;
      if (bVal < threshold) {
        visibility = 0;
      } else if (bVal < threshold + smoothThreshold) {
        visibility = (bVal - threshold) / smoothThreshold;
      }
      
      const fIdx = cacheIdx * 5;
      currentFrame[fIdx] = r;
      currentFrame[fIdx + 1] = g;
      currentFrame[fIdx + 2] = b;
      currentFrame[fIdx + 3] = bVal;
      currentFrame[fIdx + 4] = visibility;
    }
  }

  // Update history
  if (echoTimeOffset > 0) {
    history.push(currentFrame);
    const maxHistory = echoCount * echoTimeOffset + 1;
    if (history.length > maxHistory) history.shift();
  } else {
    history = [currentFrame];
  }

  for (let y = 0; y < resY; y++) {
    for (let x = 0; x < resX; x++) {
      const cacheIdx = y * resX + x;
      const fIdx = cacheIdx * 5;
      
      const r = currentFrame[fIdx];
      const g = currentFrame[fIdx + 1];
      const b = currentFrame[fIdx + 2];
      const bVal = currentFrame[fIdx + 3];
      const visibility = currentFrame[fIdx + 4];

      const posX = x * cellW + cellW / 2;
      const posY = y * cellH + cellH / 2;

      // Draw Echoes
      if (echoEnabled && echoCount > 0) {
        for (let i = echoCount; i > 0; i--) {
          let eR = r, eG = g, eB = b, eBVal = bVal, eVis = visibility;

          if (echoTimeOffset > 0) {
            const histIdx = history.length - 1 - (i * echoTimeOffset);
            if (histIdx >= 0) {
              const hFrame = history[histIdx];
              eR = hFrame[fIdx];
              eG = hFrame[fIdx + 1];
              eB = hFrame[fIdx + 2];
              eBVal = hFrame[fIdx + 3];
              eVis = hFrame[fIdx + 4];
            } else {
              continue; // Not enough history yet
            }
          }

          if (eVis <= 0) continue;

          const eScaleBase = (minScale + (maxScale - minScale) * eBVal) * eVis;
          const eScale = eScaleBase * Math.pow(echoDecay, i) * Math.pow(echoScale, i);
          const eOpacity = Math.pow(echoDecay, i);
          const eW = cellW * eScale;
          const eH = cellH * eScale;
          
          ctx.save();
          ctx.translate(posX + echoOffsetX * i, posY + echoOffsetY * i);
          ctx.globalAlpha = eOpacity;
          ctx.fillStyle = echoColor;
          
          if (shape === 'box') {
            ctx.fillRect(-eW / 2, -eH / 2, eW, eH);
          } else if (shape === 'circle') {
            ctx.beginPath();
            ctx.arc(0, 0, Math.min(eW, eH) / 2, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }
      }

      if (visibility <= 0) continue;

      // Draw Main Shape
      ctx.save();
      ctx.translate(posX, posY);
      ctx.globalAlpha = 1;

      if (colorMode === 'source') {
        ctx.fillStyle = `rgb(${r},${g},${b})`;
      } else {
        ctx.fillStyle = fgColor;
      }

      const scale = (minScale + (maxScale - minScale) * bVal) * visibility;
      const drawW = cellW * scale;
      const drawH = cellH * scale;

      if (shape === 'box') {
        ctx.fillRect(-drawW / 2, -drawH / 2, drawW, drawH);
      } else if (shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, Math.min(drawW, drawH) / 2, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }
  }

  requestAnimationFrame(draw);
}

draw();

    }

    // System Background Wiring
    if (typeof CanvasRuntimeAPI !== 'undefined') {
      var __sysBgVal = controls.get('__sys_bg');
      if (__sysBgVal) CanvasRuntimeAPI.setBackground(__sysBgVal);
    }
  </script>
</body>
