# Supabase local + remote config.
# Docs: https://supabase.com/docs/guides/local-development/cli/config
# Local dev: docs/local-development.md · Production push: docs/remote-development.md

project_id = "dashboard"

# Local dev — everything else uses CLI defaults (ports, Inbucket/Mailpit, etc.)

[api]
schemas = ["public"]

[auth]
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000/**"]

[auth.rate_limit]
email_sent = 30

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_confirmations = true
max_frequency = "1m0s"

# MCP OAuth 2.1 Server — see agents/mcp-auth.md. Dynamic Client Registration
# is on: manual-only registration meant every Claude.ai/Claude Code user
# would need to paste an opaque client_id into an "advanced OAuth" field to
# connect — unacceptable UX for the primary audience (hackers applying via
# chat, not developers). The impersonation risk DCR would otherwise open up
# (an attacker self-registering a client that claims to be "Claude Code" and
# points its redirect_uri at attacker infrastructure) is mitigated by the
# consent screen showing the actual redirect_uri, not just the client's
# self-declared name (see app/oauth/consent/consent-screen.tsx) — and this
# server's only write scope (application:write) bounds the blast radius of a
# successful phish to submitting/reading one application, not an account
# takeover.
[auth.oauth_server]
enabled = true
authorization_url_path = "/oauth/consent"
allow_dynamic_registration = true

# Local resume bucket: supabase/seed.sql (runs on start/reset). Do not add
# [storage.buckets.*] here — seed buckets --linked would provision on remote.
# Production uses AWS S3, not Supabase Storage.
[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

# OTP login — signInWithOtp / verifyOtp (app/login/page.tsx)
[auth.email.template.magic_link]
subject = "Your MHacks OTP"
content_path = "./supabase/templates/otp.html"

[auth.email.template.confirmation]
subject = "Your MHacks OTP"
content_path = "./supabase/templates/otp.html"

# Production — merged on `pnpm supabase config push`
[remotes.production]
project_id = "wbgdramqyzwrupqrcjmw"

[remotes.production.auth]
site_url = "https://mhacks.org"
additional_redirect_urls = ["https://mhacks.org/**"]

[remotes.production.auth.email.smtp]
enabled = true
host = "email-smtp.us-east-2.amazonaws.com"
port = 587
user = "env(AWS_SES_SMTP_USER)"
pass = "env(AWS_SES_SMTP_PASSWORD)"
admin_email = "hackathon@mhacks.org"
sender_name = "MHacks Team"
